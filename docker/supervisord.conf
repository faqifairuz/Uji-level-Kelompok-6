[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; PHP-FPM
[program:php-fpm]
process_name=%(program_name)s
command=/usr/local/sbin/php-fpm
autostart=true
autorestart=true
priority=999
stdout_logfile=/var/log/supervisor/php-fpm.log
stderr_logfile=/var/log/supervisor/php-fpm.err

; Nginx
[program:nginx]
process_name=%(program_name)s
command=/usr/sbin/nginx -g 'daemon off;'
autostart=true
autorestart=true
priority=998
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.err

; Laravel Queue Worker (optional - uncomment if using queues)
; [program:laravel-worker]
; process_name=%(program_name)s_%(process_num)02d
; command=php /app/artisan queue:work --sleep=3 --tries=3
; autostart=true
; autorestart=true
; numprocs=1
; redirect_stderr=true
; stdout_logfile=/var/log/supervisor/laravel-worker.log
; stopwaitsecs=3600

; Laravel Schedule (optional - uncomment if using scheduled tasks)
; [program:laravel-schedule]
; process_name=%(program_name)s
; command=php /app/artisan schedule:work
; autostart=true
; autorestart=true
; redirect_stderr=true
; stdout_logfile=/var/log/supervisor/laravel-schedule.log
